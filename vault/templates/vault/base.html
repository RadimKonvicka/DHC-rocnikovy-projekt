<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHC Records Vault</title>
    <style>
        /* Moderní minimalistický reset a temný design */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border-bottom: 1px solid #292929;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1, h2, h3 {
            color: #ffffff;
            margin-top: 0;
        }
        /* Červený akcent pro DHC styl */
        a {
            color: #ff3b30;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        a:hover {
            color: #ff453a;
            text-decoration: underline;
        }
        .btn {
            display: inline-block;
            background-color: #ff3b30;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #ff453a;
            color: #ffffff;
            text-decoration: none;
        }
        .card {
            background: #1e1e1e;
            border: 1px solid #292929;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .stats {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        .stat-item {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 6px;
            flex: 1;
            text-align: center;
            border-left: 3px solid #ff3b30;
        }
        .track-list {
            list-style: none;
            padding: 0;
        }
        .track-item {
            padding: 10px 0;
            border-bottom: 1px solid #292929;
            display: flex;
            justify-content: space-between;
        }
        .track-item:last-child {
            border-bottom: none;
        }
        .meta {
            color: #8e8e93;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="{% url 'index' %}" style="color: #fff; font-weight: bold; font-size: 1.2rem;">DHC VAULT</a>
            <nav>
                <a href="{% url 'release_list' %}">Releasy</a>
            </nav>
        </header>

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>
</body>
</html>
